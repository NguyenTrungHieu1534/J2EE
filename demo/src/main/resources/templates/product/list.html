<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="container list-page">
    <div class="card-large">

        <div class="header">
            <h1>Product List</h1>
            <a th:href="@{/products/add}" class="btn-primary">+ Add Product</a>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(listproduct)}" class="empty-state">
            <p>No products found. Click <strong>+ Add Product</strong> to get started.</p>
        </div>

        <table class="styled-table" th:if="${!#lists.isEmpty(listproduct)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Category</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="product : ${listproduct}">
                    <td th:text="${product.id}"></td>

                    <td>
                        <img th:if="${product.image != null and !product.image.isEmpty()}"
                             th:src="@{'/images/' + ${product.image}}"
                             alt="Product"
                             class="product-image">
                        <span th:if="${product.image == null or product.image.isEmpty()}" class="no-image">—</span>
                    </td>

                    <td th:text="${product.name}"></td>

                    <td class="price"
                        th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">
                    </td>

                    <td th:text="${product.category != null ? product.category.name : '—'}"></td>

                    <td class="action-buttons">
                        <a th:href="@{/products/edit/{id}(id=${product.id})}"
                           class="btn-edit">Edit</a>

                        <a th:href="@{/products/delete/{id}(id=${product.id})}"
                           class="btn-delete"
                           onclick="return confirm('Are you sure you want to delete this product?');">
                            Delete
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>
</div>

</body>
</html>
