<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

    <div class="container">
        <div class="card">
            <h1>Add New Product</h1>

            <form th:action="@{/products/add}" th:object="${product}" method="post" enctype="multipart/form-data"
                class="form">

                <!-- Name -->
                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" name="name" th:value="*{name}" placeholder="Enter product name">
                    <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </div>

                <!-- Price -->
                <div class="form-group">
                    <label for="price">Price (VND)</label>
                    <input type="number" id="price" name="price" th:value="*{price}" min="1" max="9999999"
                        placeholder="Enter price">
                    <span class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
                </div>

                <!-- Image -->
                <div class="form-group">
                    <label for="imageProduct">Product Image</label>
                    <input type="file" id="imageProduct" name="imageProduct" accept="image/*">
                </div>

                <!-- Category -->
                <div class="form-group">
                    <label for="category-id">Category</label>
                    <select id="category-id" name="category-id" required>
                        <option value="" disabled selected>Select category</option>
                        <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}">
                        </option>
                    </select>
                </div>

                <!-- Buttons -->
                <div class="button-group">
                    <button type="submit" id="btn-save" class="btn-primary">Save Product</button>
                    <a th:href="@{/products}" class="btn-secondary">Cancel</a>
                </div>

            </form>
        </div>
    </div>

</body>

</html>
