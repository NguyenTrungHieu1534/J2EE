<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

    <div class="container">
        <div class="card">
            <h1>Edit Product</h1>

            <!-- 1. Thêm th:object để liên kết với đối tượng product -->
            <form th:action="@{/products/edit}" th:object="${product}" method="post" enctype="multipart/form-data"
                class="form">

                <!-- 2. Quan trọng: Dùng th:field="*{id}" để gửi ID về Controller -->
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label for="name">Product Name</label>
                    <!-- 3. Dùng th:field thay cho name/th:value -->
                    <input type="text" id="name" th:field="*{name}" placeholder="Enter product name" required>
                </div>

                <div class="form-group">
                    <label for="price">Price</label>
                    <input type="number" id="price" th:field="*{price}" min="1" max="99999999" placeholder="Enter price"
                        required>
                </div>

                <div class="form-group">
                    <label for="imageProduct">Change Image (optional)</label>
                    <input type="file" id="imageProduct" name="imageProduct" accept="image/*">
                </div>

                <!-- Giữ nguyên phần hiển thị ảnh cũ -->
                <div class="image-preview" th:if="*{image != null and !image.isEmpty()}">
                    <p>Current image:</p>
                    <img th:src="@{'/images/' + *{image}}" alt="Product" class="current-image">
                    <!-- Giữ lại tên ảnh cũ nếu không chọn ảnh mới -->
                    <input type="hidden" th:field="*{image}">
                </div>

                <div class="form-group">
                    <label for="category-id">Category</label>
                    <!-- Lưu ý: name="category-id" phải khớp với @RequestParam trong Controller -->
                    <select id="category-id" name="category-id">
                        <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"
                            th:selected="${product.category != null and product.category.id == category.id}">
                        </option>
                    </select>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-primary">Update Product</button>
                    <a th:href="@{/products}" class="btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
