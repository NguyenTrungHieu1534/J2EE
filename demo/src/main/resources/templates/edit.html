<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Edit Product</h1>

        <form th:action="@{/products/edit}"
              method="post"
              enctype="multipart/form-data"
              class="form">

            <input type="hidden" name="id" th:value="${product.id}">

            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text"
                       id="name"
                       name="name"
                       th:value="${product.name}"
                       placeholder="Enter product name"
                       required>
            </div>

            <div class="form-group">
                <label for="price">Price</label>
                <input type="number"
                       id="price"
                       name="price"
                       th:value="${product.price}"
                       min="1"
                       max="99999999"
                       placeholder="Enter price"
                       required>
            </div>

            <div class="form-group">
                <label for="imageProduct">Change Image (optional)</label>
                <input type="file"
                       id="imageProduct"
                       name="imageProduct"
                       accept="image/*">
            </div>

            <div class="image-preview" th:if="${product.image != null and !product.image.isEmpty()}">
                <p>Current image:</p>
                <img th:src="@{'/images/' + ${product.image}}"
                     alt="Product"
                     class="current-image">
            </div>

            <div class="form-group">
                <label for="category-id">Category</label>
                <select id="category-id" name="category-id">
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}"
                            th:selected="${product.category != null and product.category.id == category.id}">
                    </option>
                </select>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary">Update Product</button>
                <a th:href="@{/products}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
