<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        #books-container {
            margin-top: 20px;
        }
        .book-item {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .book-item h3 {
            margin-top: 0;
            color: #555;
        }
        .book-info {
            margin: 5px 0;
        }
        #loading {
            color: #666;
        }
        #error {
            color: red;
        }
        pre {
            background-color: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Welcome to Book Management System</h1>
    <div id="loading">Loading books...</div>
    <div id="error"></div>
    <div id="books-container"></div>
    <div id="json-display">
        <h2>JSON Data:</h2>
        <pre id="json-output"></pre>
    </div>

    <script>
        async function fetchBooks() {
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const booksContainer = document.getElementById('books-container');
            const jsonOutput = document.getElementById('json-output');
            
            try {
                const response = await fetch('/api/books');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const books = await response.json();
                
                // Hide loading message
                loadingDiv.style.display = 'none';
                
                // Display JSON data
                jsonOutput.textContent = JSON.stringify(books, null, 2);
                
                // Display books in a user-friendly format
                if (books.length === 0) {
                    booksContainer.innerHTML = '<p>No books found. The list is empty.</p>';
                } else {
                    booksContainer.innerHTML = '<h2>Books List:</h2>';
                    books.forEach(book => {
                        const bookDiv = document.createElement('div');
                        bookDiv.className = 'book-item';
                        bookDiv.innerHTML = `
                            <h3>${book.title || 'Untitled'}</h3>
                            <div class="book-info"><strong>ID:</strong> ${book.id}</div>
                            <div class="book-info"><strong>Author:</strong> ${book.author || 'Unknown'}</div>
                        `;
                        booksContainer.appendChild(bookDiv);
                    });
                }
            } catch (error) {
                loadingDiv.style.display = 'none';
                errorDiv.innerHTML = `<p>Error fetching books: ${error.message}</p>`;
                console.error('Error:', error);
            }
        }
        
        // Fetch books when page loads
        window.addEventListener('DOMContentLoaded', fetchBooks);
    </script>
</body>
</html>
